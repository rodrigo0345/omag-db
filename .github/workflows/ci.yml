name: Go CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Unit Tests and Coverage
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'
        cache: true

    - name: Install Dependencies
      run: go mod download

    - name: Run Tests with Coverage
      # Using /... ensures all sub-packages are included
      run: go test -v -race -coverprofile=coverage.out ./buffermanager/... ./b_tree/... ./transaction_manager/...

    - name: Check Coverage Threshold
      run: |
        # Use awk for the comparison to avoid dependency on 'bc'
        COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
        echo "Total coverage: $COVERAGE%"
        awk -v cov="$COVERAGE" 'BEGIN { if (cov < 80.0) { print "Error: Coverage " cov "% is below 80%"; exit 1 } }'

  release:
    name: Package and Release
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'
    - name: Build Multi-Arch Binaries
      run: |
        # Build from current directory (.) instead of specific file for better reliability
        GOOS=linux GOARCH=amd64 go build -v -o release-linux-amd64 .
        GOOS=linux GOARCH=arm64 go build -v -o release-linux-arm64 .
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        files: |
          release-linux-amd64
          release-linux-arm64
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}