name: Go CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Unit Tests and Coverage
    runs-on: ubuntu-latest
    outputs:
      coverage_passed: ${{ steps.coverage.outputs.passed }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'
        cache: true

    - name: Install Dependencies
      run: go mod download

    - name: Run Tests with Coverage
      run: go test -v -race -coverprofile=coverage.out ./buffermanager ./b_tree ./transaction_manager

    - name: Check Coverage Threshold
      id: coverage
      run: |
        # Extract total coverage percentage, excluding main.go
        COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
        echo "Total coverage: $COVERAGE%"
        
        # Compare against 80% threshold using bc for float comparison
        if (( $(echo "$COVERAGE < 80.0" | bc -l) )); then
          echo "Error: Coverage is below 80%"
          exit 1
        fi
        echo "passed=true" >> $GITHUB_OUTPUT

  release:
    name: Package and Release
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'

    - name: Build Multi-Arch Binaries
      run: |
        # Cross-compile for standard x86 and ARM64 servers
        GOOS=linux GOARCH=amd64 go build -v -o release-linux-amd64 ./main.go
        GOOS=linux GOARCH=arm64 go build -v -o release-linux-arm64 ./main.go

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        files: |
          release-linux-amd64
          release-linux-arm64
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}