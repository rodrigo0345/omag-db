site_name: OMAG Storage Engine Documentation
site_description: Comprehensive documentation for the OMAG on-disk database storage engine
repo_url: https://github.com/rodrigo0345/omag
repo_name: omag
edit_uri: edit/main/docs/
docs_dir: '.'
site_dir: '../site'

theme:
  name: material
  logo: images/logo.png
  favicon: images/favicon.png
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Architecture:
      - Overview: architecture/overview.md
      - B+ Tree: architecture/bplus-tree.md
      - LSM Tree: architecture/lsm-tree.md
      - Buffer Pool: architecture/buffer-pool.md
      - Transactions: architecture/transactions.md
      - Concurrency: architecture/concurrency.md
  - Features:
      - Index: features/index.md
  - API Reference:
      - Index: api-reference/index.md
      - B+ Tree API: api/btree.md
      - Buffer Pool API: api/buffer-pool.md
      - LSM Tree API: api/lsm-tree.md
      - Transactions API: api/transactions.md
      - Concurrency API: api/concurrency.md
  - Packages:
      - Overview: packages/overview.md
  - Documentation:
      - Versioning: versioning.md
  - Contributing:
      - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
  - mike

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rodrigo0345/omag
